name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"   # every 12 hours
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate the snake game SVG
        uses: Platane/snk@v3
        with:
          github_user_name: ranyym
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#a855f7&color_dots=#f3e8ff,#d8b4fe,#c084fc,#a855f7,#7e22ce

      - name: Push the SVG to the "output" branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
